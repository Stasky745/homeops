# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: food
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      mealie:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: "v3.20.1"
            env:
              TZ: Europe/Andorra
              BASE_URL: https://mealie.stasky.win
              ALLOW_SIGNUP: "false"
              ALLOW_PASSWORD_LOGIN: "true"
              SQLITE_MIGRATE_JOURNAL_WAL: "true"
              DEFAULT_GROUP: Home
              DEFAULT_HOUSEHOLD: Ribera
              # OIDC — disabled until PocketID is configured
              OIDC_AUTH_ENABLED: "false"
              OIDC_SIGNUP_ENABLED: "false"
              OIDC_PROVIDER_NAME: PocketID
              OIDC_AUTO_REDIRECT: "true"
              OIDC_ADMIN_GROUP: admins
              OIDC_USER_CLAIM: email
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      app:
        controller: mealie
        ports:
          http:
            port: 9000

    persistence:
      data:
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ceph-block
        retain: true
        globalMounts:
          - path: /app/data

    route:
      app:
        hostnames:
          - mealie.stasky.win
        parentRefs:
          - name: stasky
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: mealie
                port: 9000

    defaultPodOptions:
      automountServiceAccountToken: false
