apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbird-operator
  namespace: flux-system
spec:
  targetNamespace: network
  commonMetadata:
    labels:
      app.kubernetes.io/name: netbird-operator
  dependsOn:
    - name: cert-manager
    - name: external-secrets-clustersecretstore
  path: ./kubernetes/apps/netbird/netbird-operator/operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: netbird-operator
      namespace: network
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: netbird-api-key
      namespace: network
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbird-operator-config
  namespace: flux-system
spec:
  targetNamespace: network
  commonMetadata:
    labels:
      app.kubernetes.io/name: netbird-operator
  dependsOn:
    - name: netbird-operator
  path: ./kubernetes/apps/netbird/netbird-operator/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
