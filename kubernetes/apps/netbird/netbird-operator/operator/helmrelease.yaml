---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-operator
  namespace: netbird
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: netbird-operator
    namespace: netbird
  values:
    managementURL: "https://netbird.stasky.win"
    cluster:
      name: stasky
      dns: svc.cluster.local
    netbirdAPI:
      keyFromSecret:
        name: netbird-mgmt-api-key
        key: NB_API_KEY
    routingClientImage: "netbirdio/netbird:0.74.2"
