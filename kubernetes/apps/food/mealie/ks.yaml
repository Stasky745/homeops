apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mealie
  namespace: flux-system
spec:
  targetNamespace: food
  commonMetadata:
    labels:
      app.kubernetes.io/name: mealie
  dependsOn:
    - name: rook-ceph-cluster
  path: ./kubernetes/apps/food/mealie/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: mealie
      namespace: food
