apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: newt
  namespace: flux-system
spec:
  targetNamespace: network
  commonMetadata:
    labels:
      app.kubernetes.io/name: newt
  dependsOn:
    - name: external-secrets-clustersecretstore
    - name: cloudflare-ddns
  path: ./kubernetes/apps/network/newt/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: newt
      namespace: network
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: newt-credentials
      namespace: network
