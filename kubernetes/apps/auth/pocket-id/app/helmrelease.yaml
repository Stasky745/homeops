# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
  namespace: auth
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      pocket-id:
        strategy: Recreate
        containers:
          app:
            image:
              repository: pocketid/pocket-id
              tag: "v2.11.0"
            env:
              APP_URL: https://pocket-id.stasky.win
              TRUST_PROXY: "true"
              ANALYTICS_DISABLED: "true"
              VERSION_CHECK_DISABLED: "true"
              ALLOW_USER_SIGNUPS: disabled
              EMAILS_VERIFIED: "true"
              ALLOW_INSECURE_CALLBACK_URLS: "false"
            envFrom:
              - secretRef:
                  name: pocket-id-secret
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      app:
        controller: pocket-id
        ports:
          http:
            port: 1411

    persistence:
      data:
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: ceph-block
        retain: true
        globalMounts:
          - path: /app/data

    route:
      app:
        hostnames:
          - pocket-id.stasky.win
        parentRefs:
          - name: stasky
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: pocket-id
                port: 1411

    defaultPodOptions:
      automountServiceAccountToken: false
