# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird
  namespace: netbird
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      netbird:
        replicas: 1
        containers:
          app:
            image:
              repository: netbirdio/netbird
              tag: "0.74.2"
            env:
              NB_MANAGEMENT_URL: "https://netbird.stasky.win"
            envFrom:
              - secretRef:
                  name: netbird-credentials
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
                  - SYS_RESOURCE
                  - SYS_ADMIN

    defaultPodOptions:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: luffy
      annotations:
        reloader.stakater.com/auto: "true"

    persistence:
      data:
        type: hostPath
        hostPath: /var/lib/netbird
        globalMounts:
          - path: /var/lib/netbird

      dev-net-tun:
        type: hostPath
        hostPath: /dev/net/tun
        globalMounts:
          - path: /dev/net/tun
