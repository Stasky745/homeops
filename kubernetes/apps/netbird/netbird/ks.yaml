apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbird
  namespace: flux-system
spec:
  targetNamespace: netbird
  commonMetadata:
    labels:
      app.kubernetes.io/name: netbird
  dependsOn:
    - name: app-template
    - name: external-secrets-clustersecretstore
  path: ./kubernetes/apps/netbird/netbird/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: netbird
      namespace: netbird
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: netbird-credentials
      namespace: netbird
