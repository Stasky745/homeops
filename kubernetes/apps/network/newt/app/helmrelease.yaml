# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: newt
  namespace: network
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      newt:
        replicas: 1
        containers:
          app:
            image:
              repository: fosrl/newt
              tag: "1.14.0"
            args:
              - --blueprint-file
              - /blueprint/blueprint.yaml
            env:
              PANGOLIN_ENDPOINT: "https://pangolin.stasky.win"
            envFrom:
              - secretRef:
                  name: newt-credentials
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /.config
      blueprint:
        type: configMap
        name: newt-blueprint
        globalMounts:
          - path: /blueprint

    defaultPodOptions:
      annotations:
        reloader.stakater.com/auto: "true"
      automountServiceAccountToken: false
