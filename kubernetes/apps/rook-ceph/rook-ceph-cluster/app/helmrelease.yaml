apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: rook-ceph
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  values:
    operatorNamespace: rook-ceph

    cephImage:
      repository: quay.io/ceph/ceph
      tag: v20.2.2

    toolbox:
      enabled: true
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 128Mi

    monitoring:
      enabled: false

    cephClusterSpec:
      # Writable on Talos; stale data here prevents mons from starting after a wipe
      dataDirHostPath: /var/lib/rook

      mon:
        count: 3
        allowMultiplePerNode: false

      mgr:
        count: 2
        allowMultiplePerNode: false
        modules:
          - name: pg_autoscaler
            enabled: true

      dashboard:
        enabled: true
        ssl: true

      network:
        connections:
          encryption:
            enabled: false
          compression:
            enabled: false
          requireMsgr2: true

      crashCollector:
        disable: false
        daysToRetain: 30

      logCollector:
        enabled: true
        periodicity: daily
        maxLogSize: 500M

      cleanupPolicy:
        # Set to "yes-really-destroy-data" only when intentionally tearing down
        confirmation: ""
        allowUninstallWithVolumes: false

      storage:
        useAllNodes: true
        useAllDevices: false
        # Targets Samsung 1TB (nvme0n1) — OS is on nvme1n1 after disk swap
        deviceFilter: "^nvme0n1$"
        config:
          osdsPerDevice: "1"

      disruptionManagement:
        managePodBudgets: true
        osdMaintenanceTimeout: 30

      priorityClassNames:
        mon: system-node-critical
        osd: system-node-critical
        mgr: system-cluster-critical

      resources:
        mgr:
          limits:
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        mon:
          limits:
            memory: 2Gi
          requests:
            cpu: 1000m
            memory: 1Gi
        osd:
          limits:
            memory: 4Gi
          requests:
            cpu: 1000m
            memory: 4Gi
        # No limits on prepareosd — it's a one-time burst job; OOM kill orphans the OSD
        prepareosd:
          requests:
            cpu: 500m
            memory: 50Mi
        mgr-sidecar:
          limits:
            memory: 100Mi
          requests:
            cpu: 100m
            memory: 40Mi
        crashcollector:
          limits:
            memory: 60Mi
          requests:
            cpu: 100m
            memory: 60Mi
        logcollector:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 100Mi
        exporter:
          limits:
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 50Mi

    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          mountOptions:
            - discard
          parameters:
            imageFormat: "2"
            # Talos ships kernel 6.x — full feature set is safe
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4

    cephFileSystems: []
    cephFileSystemVolumeSnapshotClass:
      enabled: false
    cephBlockPoolsVolumeSnapshotClass:
      enabled: false
    cephObjectStores: []
