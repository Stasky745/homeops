apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mealie-oidc
  namespace: food
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: mealie-oidc
    creationPolicy: Owner
  data:
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: Mealie
        property: client_id
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: Mealie
        property: client_secret
